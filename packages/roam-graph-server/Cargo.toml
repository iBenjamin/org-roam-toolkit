[package]
name = "ortk-roam-graph"
version = "0.2.8"
edition = "2021"
license = "MIT"
description = "Local org-roam graph viewer (axum + Sigma.js, single static binary)"
authors = ["Benjamin Wong <iwangkaimin@gmail.com>"]
repository = "https://github.com/iBenjamin/org-roam-toolkit"
homepage = "https://github.com/iBenjamin/org-roam-toolkit"
readme = "README.md"

[lib]
name = "ortk_roam_graph"
path = "src/lib.rs"

[[bin]]
name = "ortk-roam-graph"
path = "src/main.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "time", "io-util", "sync", "signal", "fs"] }
tower = "0.5"
tower-http = { version = "0.5", features = ["trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
maud = { version = "0.26", features = ["axum"] }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
thiserror = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
rusqlite = { version = "0.31", features = ["bundled"] }
orgize = "0.10.0-alpha.10"
notify = "6"
notify-debouncer-mini = { version = "0.4", default-features = false }
mime_guess = "2"
lru = "0.12"
tokio-stream = { version = "0.1", features = ["sync"] }
futures = "0.3"
async-stream = "0.3"
url = "2"

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
reqwest = { version = "0.12", features = ["stream"], default-features = false }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
