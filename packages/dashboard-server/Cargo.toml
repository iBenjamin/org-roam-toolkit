[package]
name = "ortk-dashboard"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Local observability dashboard for the org-roam-toolkit (axum + HTMX, single static binary)"
authors = ["Benjamin Wong <iwangkaimin@gmail.com>"]
repository = "https://github.com/iBenjamin/org-roam-toolkit"
homepage = "https://github.com/iBenjamin/org-roam-toolkit"
readme = "README.md"

[[bin]]
name = "ortk-dashboard"
path = "src/main.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "time", "io-util", "sync", "signal"] }
tower = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
maud = { version = "0.26", features = ["axum"] }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
thiserror = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
